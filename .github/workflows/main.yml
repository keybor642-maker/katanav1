name: Build KatanaPlugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Locate pom.xml
        id: find_pom
        run: |
          POM_PATH=$(find . -maxdepth 4 -name "pom.xml" | head -n 1)
          echo "pom_path=$POM_PATH" >> "$GITHUB_OUTPUT"
          echo "pom_dir=$(dirname "$POM_PATH")" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn -B clean package -f "${{ steps.find_pom.outputs.pom_path }}"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: KatanaPlugin
          path: ${{ steps.find_pom.outputs.pom_dir }}/target/*.jar
